  // ============================================
  // APPLICATION STATE - SINGLE PATH ONLY
  // ============================================
  
  let currentPath = ['10th'];
  let currentNodeId = '10th';

  function render() {
    const node = careerDB[currentNodeId];
    if (!node) {
      console.error('Node not found:', currentNodeId);
      return;
    }

    // Build breadcrumb
    let breadcrumbHtml = '<div class="path-breadcrumb">';
    for (let i = 0; i < currentPath.length; i++) {
      const pathNode = careerDB[currentPath[i]];
      if (pathNode) {
        breadcrumbHtml += `<span class="path-item" onclick="goToPathItem(${i})">${pathNode.name.length > 25 ? pathNode.name.substring(0, 22) + '...' : pathNode.name}</span>`;
        if (i < currentPath.length - 1) {
          breadcrumbHtml += `<span class="path-arrow"><i class="fas fa-arrow-right"></i></span>`;
        }
      }
    }
    breadcrumbHtml += '</div>';

    // Current node
    let html = breadcrumbHtml;
    html += `
      <div class="current-section">
        <div class="current-card">
          <div class="current-icon"><i class="fas ${node.icon}"></i></div>
          <div class="current-title">${node.name}</div>
          <div class="current-desc">${node.desc}</div>
        </div>
      </div>
    `;

    // Info if available
    if (node.info) {
      html += `<div class="detail-panel"><div class="detail-title"><i class="fas fa-info-circle"></i> About This Path</div><div class="info-content">${node.info}</div></div>`;
    }

    // Options
    if (node.options && node.options.length > 0) {
      html += `<div class="options-grid">`;
      for (let opt of node.options) {
        html += `
          <div class="option-card" onclick="selectOption('${opt.id}')">
            <div class="option-icon"><i class="fas ${opt.icon}"></i></div>
            <div class="option-title">${opt.name}</div>
            <div class="option-desc">${opt.desc}</div>
          </div>
        `;
      }
      html += `</div>`;
    }

    // Career details
    if (node.details) {
      html += renderCareerDetails(node);
    }

    // Buttons
    html += `
      <div class="button-group">
        <button class="btn-reset" onclick="resetToStart()"><i class="fas fa-home"></i> Start Over</button>
      </div>
    `;

    document.getElementById('mainContent').innerHTML = html;
  }

  function renderCareerDetails(node) {
    let html = `
      <div class="detail-panel">
        <div class="detail-title"><i class="fas fa-briefcase"></i> Complete Career Information</div>
        <div class="detail-grid">
    `;

    for (let [key, value] of Object.entries(node.details)) {
      if (Array.isArray(value)) {
        html += `
          <div class="detail-card">
            <div class="detail-label">${key.toUpperCase()}</div>
            <div class="detail-value">${value.map(v => `<span class="skill-tag">${v}</span>`).join('')}</div>
          </div>
        `;
      } else if (typeof value === 'string') {
        html += `
          <div class="detail-card">
            <div class="detail-label">${key.toUpperCase()}</div>
            <div class="detail-value">${value}</div>
          </div>
        `;
      }
    }

    html += `</div></div>`;
    return html;
  }

  function selectOption(optionId) {
    currentPath.push(optionId);
    currentNodeId = optionId;
    render();
  }

  function goToPathItem(index) {
    currentPath = currentPath.slice(0, index + 1);
    currentNodeId = currentPath[currentPath.length - 1];
    render();
  }

  function resetToStart() {
    currentPath = ['10th'];
    currentNodeId = '10th';
    render();
  }

  // Initialize
  render();
</script>
