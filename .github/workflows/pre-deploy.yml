name: Pre-deploy Stats Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pre-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Run pre-deploy script
        run: node scripts/pre-render.js
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Pre-deploy: Update job stats [skip ci]"
          git push
