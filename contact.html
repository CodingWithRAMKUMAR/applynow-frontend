<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact ApplyMore</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a2a;
      color: #f0f3ff;
      padding: 2rem;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .contact-card {
      background: rgba(20, 20, 50, 0.65);
      border-radius: 1rem;
      padding: 2rem;
      margin-top: 2rem;
    }
    h1 { color: #3b82f6; margin-bottom: 1rem; }
    .info { margin: 1.5rem 0; padding: 1rem; background: rgba(59,130,246,0.1); border-radius: 0.5rem; }
    a { color: #3b82f6; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📧 Contact ApplyMore</h1>
    <div class="contact-card">
      <p>Have questions, suggestions, or found a broken link? Reach out to us!</p>
      
      <div class="info">
        <strong>📧 Email:</strong> <a href="mailto:connectwithme.ramkumar@gmail.com">connectwithme.ramkumar@gmail.com</a>
      </div>
      
      <div class="info">
        <strong>📍 Location:</strong> Hyderabad, India
      </div>
      
      <div class="info">
        <strong>⏰ Response Time:</strong> Within 24-48 hours
      </div>
      
      <p style="margin-top: 1rem;">For job-related inquiries, please include the job link in your email.</p>
    </div>
  </div>
</body>
</html>
