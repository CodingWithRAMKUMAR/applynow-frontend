<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Details – ApplyMore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a2a;--card-bg:rgba(20,20,50,0.65);--text:#f0f3ff;--text-muted:#9ca3cf;--border:rgba(255,255,255,0.1);--accent:#3b82f6}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:2rem;line-height:1.6}
    body.light{--bg:#f8fafc;--card-bg:rgba(255,255,255,0.85);--text:#1e293b;--text-muted:#475569;--border:rgba(0,0,0,0.1);--accent:#2563eb}
    body.vibrant{--bg:#fdf2f8;--card-bg:rgba(255,255,255,0.9);--text:#831843;--text-muted:#9d174d;--accent:#ec489a}
    .container{max-width:800px;margin:0 auto}
    .detail-card{background:var(--card-bg);backdrop-filter:blur(10px);border-radius:1rem;padding:2rem;border:1px solid var(--border)}
    .back-link{display:inline-block;margin-bottom:1rem;color:var(--accent);text-decoration:none}
    h1{font-size:1.8rem;margin-bottom:0.5rem;color:var(--accent)}
    .company{font-size:1.2rem;margin-bottom:0.3rem}
    .location{font-size:0.9rem;color:var(--text-muted);margin-bottom:1rem}
    .description{white-space:pre-wrap;margin:1rem 0}
    .apply-btn{display:inline-block;background:var(--accent);color:white;padding:0.6rem 1.5rem;border-radius:2rem;text-decoration:none;margin-top:1rem}
    .loading,.error{text-align:center;padding:2rem}
    footer{margin-top:2rem;text-align:center;font-size:0.7rem;color:var(--text-muted)}
    .nav-links{display:flex;justify-content:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap}
    .nav-links a{color:var(--text-muted);text-decoration:none}
    .top-bar{display:flex;justify-content:flex-end;gap:0.5rem;margin-bottom:1rem}
    .theme-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:2rem;padding:0.2rem 0.6rem;cursor:pointer;font-size:0.7rem;color:var(--text)}
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <button class="theme-btn" id="lightTheme">Light</button>
    <button class="theme-btn" id="darkTheme">Dark</button>
    <button class="theme-btn" id="vibrantTheme">Vibrant</button>
  </div>
  <div class="nav-links">
    <a href="index.html">🏠 Home</a>
    <a href="about.html">📖 About</a>
    <a href="blog.html">✍️ Blog</a>
    <a href="contact.html">📧 Contact</a>
    <a href="privacy.html">🔒 Privacy</a>
    <a href="terms.html">⚖️ Terms</a>
  </div>
  <div id="jobContent">
    <div class="loading">Loading job details...</div>
  </div>
  <footer>
    <p>© 2026 ApplyMore – Helping freshers land their dream job</p>
  </footer>
</div>
<script>
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.body.classList.add(savedTheme);
  function setTheme(theme) { document.body.classList.remove('light','vibrant'); if(theme!=='dark') document.body.classList.add(theme); localStorage.setItem('theme',theme); }
  document.getElementById('lightTheme')?.addEventListener('click',()=>setTheme('light'));
  document.getElementById('darkTheme')?.addEventListener('click',()=>setTheme('dark'));
  document.getElementById('vibrantTheme')?.addEventListener('click',()=>setTheme('vibrant'));

  const SUPABASE_URL = 'https://qmljqckhhdmvcbomydhf.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_rmCQIW6Lw90zleW-lYZcFw_WZrcHw4h';
  function getQueryParam(p) { return new URLSearchParams(window.location.search).get(p); }
  function escapeHtml(s){ return s? s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]):''; }
  function decodeHtmlEntities(str) { if (!str) return ''; const t = document.createElement('textarea'); t.innerHTML = str; return t.value; }
  async function fetchJob() {
    const id = getQueryParam('id');
    if (!id) { document.getElementById('jobContent').innerHTML = '<div class="error">No job ID specified.</div>'; return; }
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/ApplyMore?id=eq.${id}`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } });
      if (!res.ok) throw new Error();
      const jobs = await res.json();
      if (!jobs.length) throw new Error();
      const job = jobs[0];
      const cleanDesc = decodeHtmlEntities(job.description || 'No description provided.');
      document.getElementById('jobContent').innerHTML = `
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Jobs</a>
        <div class="detail-card">
          <h1>${escapeHtml(job.title)}</h1>
          <div class="company"><i class="fas fa-building"></i> ${escapeHtml(job.company)}</div>
          <div class="location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Not specified')}</div>
          <div class="description">${escapeHtml(cleanDesc)}</div>
          <a href="${escapeHtml(job.url)}" target="_blank" class="apply-btn">Apply Now →</a>
        </div>
      `;
    } catch(e) { document.getElementById('jobContent').innerHTML = '<div class="error">Failed to load job. Please try again later.</div>'; }
  }
  fetchJob();
</script>
</body>
</html>
