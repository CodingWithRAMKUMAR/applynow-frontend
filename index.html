<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6599003415562086" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ApplyMore – Futuristic IT Fresher Jobs</title>
  <meta name="description" content="ApplyMore finds the latest IT fresher jobs across India. Search, filter by location, and apply directly to company websites. Free and updated daily.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0a2a;
      --glass-bg: rgba(20, 20, 50, 0.65);
      --glass-border: rgba(100, 150, 255, 0.3);
      --text-light: #f0f3ff;
      --text-muted: #a0b0d0;
      --accent: #3b82f6;
      --accent-glow: #5a9eff;
      --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      --transition: all 0.25s ease;
      --input-bg: rgba(10, 10, 40, 0.6);
      --button-bg: var(--accent);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0a2a, #020218);
      min-height: 100vh;
      color: var(--text-light);
      position: relative;
      overflow-x: hidden;
    }

    /* Light theme overrides */
    body.light {
      background: radial-gradient(circle at 20% 30%, #f8fafc, #eef2f6);
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(0, 0, 0, 0.1);
      --text-light: #1e293b;
      --text-muted: #475569;
      --input-bg: rgba(255, 255, 255, 0.9);
    }
    body.vibrant {
      background: radial-gradient(circle at 20% 30%, #fdf2f8, #fce7f3);
      --glass-bg: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(236, 72, 153, 0.4);
      --text-light: #831843;
      --text-muted: #9d174d;
      --accent: #ec489a;
      --accent-glow: #f472b6;
      --input-bg: rgba(255, 240, 245, 0.9);
    }

    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(2px);
    }

    .main-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .main-header h1 {
      font-size: 3.5rem;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -1px;
    }
    .main-header p {
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 0.8rem 1.5rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid var(--glass-border);
    }

    .theme-controls {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .theme-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-light);
      transition: var(--transition);
    }
    body.light .theme-btn, body.vibrant .theme-btn {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.15);
      color: var(--text-light);
    }
    .theme-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .accent-picker {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .accent-picker label {
      font-size: 0.8rem;
    }
    #accentColor {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--glass-border);
      cursor: pointer;
      background: var(--accent);
    }

    /* Add link box (top) */
    .add-link-box {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--glass-border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }
    .add-link-box h3 {
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-light);
    }
    .add-link-box input {
      flex: 3;
      padding: 0.7rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      color: var(--text-light);

    body.light .add-link-box input, body.vibrant .add-link-box input {
      color: #1e293b;
    }
    .add-link-box button {
      background: var(--accent);
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      color: white;
      cursor: pointer;
      transition: var(--transition);

    .add-link-box button:hover {

    .links-list {

    .links-list a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.1);
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;

    body.light .links-list a, body.vibrant .links-list a {
      background: rgba(0,0,0,0.05);

    .links-list a:hover {
      background: var(--accent);
      color: white;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      background: var(--glass-bg);

    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));

    .job-card {
      background: rgba(20, 25, 55, 0.7);

    @keyframes fadeInUp {

      font-size: 1.2rem;

      margin-bottom: 0.5rem;

      flex-wrap: wrap;

    .location {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;

      font-size: 0.85rem;

      display: inline-block;

      margin-bottom: 1rem;

    .expiring-badge {
      background: #f97316;
      color: white;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;

    .new-badge {
      background: #22c55e;
      color: white;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      margin-left: 0.5rem;
    }
    .view-details {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: var(--transition);
    }
    .view-details:hover {
      background: var(--accent-glow);
      box-shadow: 0 0 8px var(--accent);
    }

    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .skeleton-card {
      background: rgba(30,35,70,0.5);
      backdrop-filter: blur(4px);
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid rgba(100,150,255,0.1);
      animation: pulse 1.5s infinite;
    }
    body.light .skeleton-card, body.vibrant .skeleton-card {
      background: rgba(200,200,200,0.5);
    }
    .skeleton-title, .skeleton-company, .skeleton-location, .skeleton-desc, .skeleton-btn {
      background: rgba(255,255,255,0.2);
      border-radius: 0.5rem;
      margin-bottom: 0.8rem;
    }
    body.light .skeleton-title, body.light .skeleton-company, body.light .skeleton-location, body.light .skeleton-desc, body.light .skeleton-btn {
      background: rgba(0,0,0,0.1);
    }
    .skeleton-title { height: 1.5rem; width: 70%; }
    .skeleton-company { height: 1rem; width: 50%; }
    .skeleton-location { height: 1rem; width: 60%; }
    .skeleton-desc { height: 3rem; width: 100%; }
    .skeleton-btn { height: 2rem; width: 40%; }
    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 0.8; }
      100% { opacity: 0.4; }
    }

    /* Footer with opinion box */
    footer {
      text-align: center;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--glass-border);
    }
    .opinion-box {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid var(--glass-border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .opinion-box h3 {
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-light);
    }
    .opinion-box textarea {
      flex: 2;
      padding: 0.7rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 1rem;
      color: var(--text-light);
      resize: vertical;
    }
    body.light .opinion-box textarea, body.vibrant .opinion-box textarea {
      color: #1e293b;
    }
    .opinion-box button {
      background: var(--accent);
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      color: white;
      cursor: pointer;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 1rem 0;
    }
    .footer-links a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
    .copyright {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 1rem;
    }
    @media (max-width: 640px) {
      .container { padding: 1rem; }
      .controls { flex-direction: column; }
      .search-box, .location-filter select { width: 100%; }
      .add-link-box, .opinion-box { flex-direction: column; align-items: stretch; }
      .links-list { justify-content: center; }
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="container">
    <div class="main-header">
      <h1>ApplyMore</h1>
      <p>⚡ Your launchpad to an IT career ⚡</p>
    </div>
    <div class="top-bar">
      <div class="theme-controls">
        <button class="theme-btn" id="lightTheme">Light</button>
        <button class="theme-btn" id="darkTheme">Dark</button>

      <input type="url" id="newLinkInput" placeholder="Paste the job URL here..." />

      <div class="links-list" id="linksListContainer">
        <span>📌 Recent:</span>
        <div id="linksList" style="display: flex; flex-wrap: wrap; gap: 0.5rem;"></div>
      </div>
    </div>

    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search jobs, companies, skills...">
      </div>
      <div class="location-filter">
        <select id="locationFilter">
          <option value="all">All Locations</option>
          <option value="Chennai">Chennai</option>
          <option value="Hyderabad">Hyderabad</option>
          <option value="Gurugram">Gurugram</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Pune">Pune</option>
        </select>
      </div>
    </div>

    <div id="jobsContainer" class="jobs-grid">
      <div class="skeleton-grid">
        <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-company"></div><div class="skeleton-location"></div><div class="skeleton-desc"></div><div class="skeleton-btn"></div></div>
        <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-company"></div><div class="skeleton-location"></div><div class="skeleton-desc"></div><div class="skeleton-btn"></div></div>
      </div>
    </div>

    <footer>
      <div class="opinion-box">
        <h3><i class="fas fa-comment-dots"></i> Your opinion</h3>
        <textarea id="opinionText" rows="1" placeholder="Suggestions, feedback, or requests..."></textarea>
        <button id="submitOpinionBtn">Submit</button>
      </div>
      <div class="footer-links">
        <a href="#" id="shareTwitter"><i class="fab fa-twitter"></i> Share on Twitter</a>
        <a href="#" id="shareLinkedin"><i class="fab fa-linkedin"></i> Share on LinkedIn</a>
        <a href="#" id="reportIssue">Report Issue</a>
      </div>
      <p>Made with <i class="fas fa-heart" style="color: #ec489a;"></i> by Ram — Helping freshers land their dream job.</p>
      <p class="copyright">© 2026 ApplyMore. Jobs are updated every 12 hours. Data from LinkedIn & Indeed.</p>
    </footer>
  </div>

  <script>
    // --------------------------------------------------------------
    // 1. ENHANCED PARTICLE BACKGROUND (GLOW ON MOUSE)
    // --------------------------------------------------------------
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let mouseX = 0, mouseY = 0;
    let particleCount = 180;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = (Math.random() - 0.5) * 0.8;
        this.speedY = (Math.random() - 0.5) * 0.8;
        this.baseColor = `hsl(${Math.random() * 60 + 200}, 80%, 65%)`;
        this.glowIntensity = 0;
      }
      update() {
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          const angle = Math.atan2(dy, dx);
          const force = (150 - dist) / 600;
          this.speedX += Math.cos(angle) * force;
          this.speedY += Math.sin(angle) * force;
          this.glowIntensity = Math.min(1, (150 - dist) / 100);
        } else {
          this.glowIntensity = Math.max(0, this.glowIntensity - 0.02);
        }
        this.speedX *= 0.99;
        this.speedY *= 0.99;
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        if (this.glowIntensity > 0) {
          ctx.shadowBlur = 20 * this.glowIntensity;
          ctx.shadowColor = `rgba(100, 200, 255, ${this.glowIntensity})`;
        } else {
          ctx.shadowBlur = 0;
        }
        ctx.fillStyle = this.baseColor;
        ctx.fill();
        for (let p of particles) {
          const dx = this.x - p.x;
          const dy = this.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120 && dist > 5) {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = `rgba(100, 150, 255, ${0.2 * (1 - dist / 120) * (this.glowIntensity + 0.5)})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) particles.push(new Particle());
    }
    initParticles();

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    // --------------------------------------------------------------
    // 2. SUPABASE JOBS (stable)
    // --------------------------------------------------------------
    const SUPABASE_URL = 'https://qmljqckhhdmvcbomydhf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_rmCQIW6Lw90zleW-lYZcFw_WZrcHw4h';

    let allJobs = [];

    function showSkeleton() {
      const container = document.getElementById('jobsContainer');
      container.innerHTML = `
        <div class="skeleton-grid">
          ${Array(6).fill(`
            <div class="skeleton-card">
              <div class="skeleton-title"></div>
              <div class="skeleton-company"></div>
              <div class="skeleton-location"></div>
              <div class="skeleton-desc"></div>
              <div class="skeleton-btn"></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function getJobBadge(createdAt) {
      if (!createdAt) return '';
      const ageHours = (new Date() - new Date(createdAt)) / (1000 * 60 * 60);
      if (ageHours <= 24) return '<span class="new-badge">New</span>';
      if (ageHours <= 30) return '<span class="expiring-badge">Expiring soon</span>';
      return '';
    }

    async function fetchJobs(showLoader = true) {
      if (showLoader) showSkeleton();
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/ApplyMore?select=*&order=created_at.desc`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        localStorage.setItem('cachedJobs', JSON.stringify({ timestamp: Date.now(), jobs: data }));
        allJobs = data.map(job => ({
          _id: job.id,
          title: job.title,
          company: job.company,
          location: job.location,
          description: job.description,
          posted_date: job.posted_date,
          created_at: job.created_at,
          url: job.url
        }));
        displayJobs();
      } catch (err) {
        console.error(err);
        const cached = localStorage.getItem('cachedJobs');
        if (cached) {
          const { jobs } = JSON.parse(cached);
          allJobs = jobs;
          displayJobs(true);
          const container = document.getElementById('jobsContainer');
          container.innerHTML += '<div class="no-jobs" style="margin-top:1rem;">⚠️ Using cached jobs. New jobs will appear soon.</div>';
        } else {
          document.getElementById('jobsContainer').innerHTML = '<div class="no-jobs">Failed to load jobs. Please refresh.</div>';
        }
      }
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      return new Date(dateString).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function displayJobs(fromCache = false) {
      const container = document.getElementById('jobsContainer');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const selectedLocation = document.getElementById('locationFilter').value;

      let filtered = allJobs;
      if (selectedLocation !== 'all') {
        filtered = filtered.filter(job => job.location && job.location.toLowerCase().includes(selectedLocation.toLowerCase()));
      }
      if (searchTerm) {
        filtered = filtered.filter(job =>
          job.title.toLowerCase().includes(searchTerm) ||
          job.company.toLowerCase().includes(searchTerm) ||
          (job.description && job.description.toLowerCase().includes(searchTerm))
        );
      }

      if (!filtered.length) {
        container.innerHTML = '<div class="no-jobs">No jobs found. Check back soon!</div>';
        return;
      }

      container.innerHTML = filtered.map(job => {
        const cleanDesc = (job.description || '').substring(0, 200);
        const badge = getJobBadge(job.created_at);
        return `
          <div class="job-card">
            <div class="job-title">
              ${escapeHtml(job.title)}
              ${badge}
            </div>
            <div class="company">${escapeHtml(job.company)}</div>
            <div class="location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Not specified')}</div>
            <div class="description">${escapeHtml(cleanDesc)}...</div>
            <div class="deadline">📅 Posted: ${formatDate(job.posted_date || job.created_at)}</div>
            <a href="${escapeHtml(job.url)}" target="_blank" class="view-details">Apply →</a>
          </div>
        `;
      }).join('');
    }

    // --------------------------------------------------------------
    // 3. RECOMMENDED LINKS (localStorage)
    // --------------------------------------------------------------
    let recommendedLinks = JSON.parse(localStorage.getItem('recommendedLinks') || '[]');
    function renderLinks() {
      const container = document.getElementById('linksList');
      if (!container) return;
      if (recommendedLinks.length === 0) {
        container.innerHTML = '<span style="color: var(--text-muted);">No links yet. Add one!</span>';
        return;
      }
      container.innerHTML = recommendedLinks.map(link => `<a href="${escapeHtml(link)}" target="_blank">🔗 ${link.length > 40 ? link.substring(0,40)+'...' : link}</a>`).join('');
    }
    function addLink(link) {
      if (!link) return;
      try {
        new URL(link);
        recommendedLinks.unshift(link);
        if (recommendedLinks.length > 10) recommendedLinks.pop();
        localStorage.setItem('recommendedLinks', JSON.stringify(recommendedLinks));
        renderLinks();
        alert('Link added! It will appear at the top for everyone (on this browser).');
      } catch(e) {
        alert('Invalid URL. Please include http:// or https://');
      }
    }
    document.getElementById('submitLinkBtn')?.addEventListener('click', () => {
      const input = document.getElementById('newLinkInput');
      if (input.value.trim()) addLink(input.value.trim());
      input.value = '';
    });
    renderLinks();

    // --------------------------------------------------------------
    // 4. OPINION BOX (footer)
    // --------------------------------------------------------------
    document.getElementById('submitOpinionBtn')?.addEventListener('click', () => {
      const opinion = document.getElementById('opinionText').value.trim();
      if (!opinion) return;
      let opinions = JSON.parse(localStorage.getItem('userOpinions') || '[]');
      opinions.unshift({ text: opinion, date: new Date().toISOString() });
      if (opinions.length > 10) opinions.pop();
      localStorage.setItem('userOpinions', JSON.stringify(opinions));
      alert('Thank you for your feedback!');
      document.getElementById('opinionText').value = '';
    });

    // --------------------------------------------------------------
    // 5. THEME SWITCHING & EVENT LISTENERS
    // --------------------------------------------------------------
    function setTheme(theme) {
      document.body.classList.remove('light', 'dark', 'vibrant');
      document.body.classList.add(theme);
      localStorage.setItem('theme', theme);
    }
    function setAccent(color) {
      document.documentElement.style.setProperty('--accent', color);
      let r,g,b;
      if (color.startsWith('#')) {
        r = parseInt(color.slice(1,3),16);
        g = parseInt(color.slice(3,5),16);
        b = parseInt(color.slice(5,7),16);
      } else {
        r=59; g=130; b=246;
      }
      const darker = `rgb(${Math.max(0,r-30)}, ${Math.max(0,g-30)}, ${Math.max(0,b-30)})`;
      document.documentElement.style.setProperty('--accent-glow', darker);
      localStorage.setItem('accentColor', color);
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);
    const savedAccent = localStorage.getItem('accentColor') || '#3b82f6';
    setAccent(savedAccent);
    document.getElementById('accentColor').value = savedAccent;

    document.getElementById('lightTheme')?.addEventListener('click', () => setTheme('light'));
    document.getElementById('darkTheme')?.addEventListener('click', () => setTheme('dark'));
    document.getElementById('vibrantTheme')?.addEventListener('click', () => setTheme('vibrant'));
    document.getElementById('accentColor')?.addEventListener('input', (e) => setAccent(e.target.value));

    document.getElementById('searchInput')?.addEventListener('input', () => displayJobs());
    document.getElementById('locationFilter')?.addEventListener('change', () => displayJobs());

    document.getElementById('shareTwitter')?.addEventListener('click', (e) => {
      e.preventDefault();
      window.open(`https://twitter.com/intent/tweet?text=Find IT fresher jobs in India! ${encodeURIComponent(window.location.href)}`, '_blank');
    });
    document.getElementById('shareLinkedin')?.addEventListener('click', (e) => {
      e.preventDefault();
      window.open(`https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(window.location.href)}&title=IT Fresher Jobs in India`, '_blank');
    });
    document.getElementById('reportIssue')?.addEventListener('click', (e) => {
      e.preventDefault();
      alert('Please email your issue to applymore@example.com (replace with your actual contact)');
    });

    setInterval(() => fetchJobs(true), 5 * 60 * 1000);
    fetchJobs();
  </script>
</body>
</html>
