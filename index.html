<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ApplyMore | Elite Tech Careers</title>
  <meta name="description" content="Discover high‑impact IT jobs for freshers in India. Curated roles, smart filters, and a futuristic experience.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --surface: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-dim: #a0a0a0;
      --accent: #4facfe;
      --accent-glow: rgba(79, 172, 254, 0.4);
      --transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body.light {
      --bg: #f5f7fb;
      --surface: rgba(0, 0, 0, 0.02);
      --border: rgba(0, 0, 0, 0.08);
      --text: #111111;
      --text-dim: #5a5a5a;
      --accent-glow: rgba(79, 172, 254, 0.2);
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: background-color 0.5s ease;
      overflow-x: hidden;
    }

    /* Simple floating gradient that follows mouse (lightweight) */
    .cursor-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.05s linear;
      z-index: 1;
      will-change: transform;
      filter: blur(60px);
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 80px;
      margin-bottom: 3rem;
    }
    .logo {
      font-family: 'Space Grotesk', monospace;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -2px;
      background: linear-gradient(135deg, var(--accent), #fff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-actions {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .theme-toggle, .color-picker-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }
    .theme-toggle:hover, .color-picker-wrapper:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }
    #accentColor {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 4rem 0 3rem;
    }
    .hero .badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(4px);
    }
    h1 {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent) 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Search & Filter Bar */
    .filters-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 48px;
      padding: 1.5rem;
      margin: 2rem 0 3rem;
      backdrop-filter: blur(12px);
    }
    .search-group {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255,255,255,0.05);
      border-radius: 80px;
      padding: 0.8rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .search-group i {
      color: var(--accent);
      font-size: 1.2rem;
    }
    .search-group input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
    }
    .location-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .pill {
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .pill.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .pill:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    /* Job Grid */
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
    }
    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 1.8rem;
      transition: var(--transition);
      backdrop-filter: blur(4px);
    }
    .job-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--accent);
      box-shadow: 0 20px 35px -15px rgba(0,0,0,0.3);
    }
    .company {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.8rem;
    }
    .job-title {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
    }
    .meta span {
      background: rgba(255,255,255,0.08);
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
    }
    .apply-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    .apply-btn:hover {
      transform: scale(1.05);
      filter: brightness(1.1);
    }
    .share-icons {
      display: flex;
      gap: 0.8rem;
    }
    .share-icons i {
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-dim);
      transition: var(--transition);
    }
    .share-icons i:hover {
      color: var(--accent);
    }

    footer {
      text-align: center;
      margin-top: 5rem;
      padding: 2rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 640px) {
      .container { padding: 1rem; }
      .jobs-grid { grid-template-columns: 1fr; }
      .filters-panel { padding: 1rem; }
      nav { padding: 0.8rem 1.2rem; }
      .logo { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="container">
    <nav>
      <div class="logo">Apply<span style="color:var(--accent)">More</span></div>
      <div class="nav-actions">
        <div class="color-picker-wrapper">
          <input type="color" id="accentColor" value="#4facfe">
        </div>
        <div class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
          <i class="fas fa-moon"></i>
        </div>
      </div>
    </nav>

    <header class="hero">
      <div class="badge">🔥 NEXT‑GEN CAREER PLATFORM</div>
      <h1>Your Launchpad<br>to the Future</h1>
    </header>

    <div class="filters-panel">
      <div class="search-group">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by role, company, or tech stack...">
      </div>
      <div class="location-pills" id="locationPills">
        <!-- Dynamic pills will be inserted here -->
      </div>
    </div>

    <div id="jobsContainer" class="jobs-grid">
      <!-- Jobs will appear here -->
    </div>

    <footer>
      <p style="color: var(--text-dim);">© 2025 ApplyMore – Curated for India’s brightest minds.</p>
    </footer>
  </div>

  <script>
    // ---------- RELIABLE MOCK DATA (always works) ----------
    const MOCK_JOBS = [
      { company: "Tech Innovators", title: "Frontend Developer (React)", location: "Bangalore", url: "https://example.com/frontend", applicationDeadline: "2025-05-15" },
      { company: "FutureStack", title: "Backend Engineer (Python)", location: "Hyderabad", url: "https://example.com/backend", applicationDeadline: "2025-05-10" },
      { company: "AI Dynamics", title: "Machine Learning Intern", location: "Pune", url: "https://example.com/ml", applicationDeadline: "2025-04-30" },
      { company: "CloudScale", title: "DevOps Engineer", location: "Mumbai", url: "https://example.com/devops", applicationDeadline: "2025-05-20" },
      { company: "DataWise", title: "Data Analyst", location: "Chennai", url: "https://example.com/data", applicationDeadline: "2025-05-05" },
      { company: "CyberShield", title: "Security Analyst", location: "Bangalore", url: "https://example.com/security", applicationDeadline: "2025-05-12" },
      { company: "FinTech Hub", title: "Full Stack Developer", location: "Mumbai", url: "https://example.com/fullstack", applicationDeadline: "2025-05-18" },
      { company: "HealthTech", title: "iOS Developer", location: "Hyderabad", url: "https://example.com/ios", applicationDeadline: "2025-05-25" },
    ];

    // Global state
    let allJobs = [...MOCK_JOBS];
    let currentLoc = 'all';

    // DOM elements
    const jobsContainer = document.getElementById('jobsContainer');
    const searchInput = document.getElementById('searchInput');
    const locationPillsDiv = document.getElementById('locationPills');

    // Helper
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Update location pills based on available locations
    function updateLocationPills() {
      const locations = [...new Set(allJobs.map(job => job.location).filter(Boolean))];
      let pillsHtml = `<div class="pill ${currentLoc === 'all' ? 'active' : ''}" data-loc="all">All Cities</div>`;
      locations.forEach(loc => {
        pillsHtml += `<div class="pill ${currentLoc === loc ? 'active' : ''}" data-loc="${escapeHtml(loc)}">${escapeHtml(loc)}</div>`;
      });
      locationPillsDiv.innerHTML = pillsHtml;

      // Attach click events to pills
      document.querySelectorAll('.pill').forEach(pill => {
        pill.addEventListener('click', (e) => {
          document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          currentLoc = pill.dataset.loc;
          displayJobs();
        });
      });
    }

    // Display jobs based on current filters
    function displayJobs() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      let filtered = allJobs.filter(job => {
        const matchLoc = currentLoc === 'all' || job.location === currentLoc;
        const matchSearch = !searchTerm ||
          job.title.toLowerCase().includes(searchTerm) ||
          job.company.toLowerCase().includes(searchTerm);
        return matchLoc && matchSearch;
      });

      if (filtered.length === 0) {
        jobsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">✨ No matching roles found. Try another keyword!</div>`;
        return;
      }

      jobsContainer.innerHTML = filtered.map((job, idx) => `
        <div class="job-card" style="animation: fadeInUp 0.4s ease forwards ${idx * 0.05}s; opacity:0;">
          <div class="company">${escapeHtml(job.company)}</div>
          <div class="job-title">${escapeHtml(job.title)}</div>
          <div class="meta">
            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Remote')}</span>
            <span><i class="fas fa-calendar-alt"></i> ${job.applicationDeadline ? new Date(job.applicationDeadline).toLocaleDateString() : 'Rolling'}</span>
          </div>
          <div class="card-footer">
            <a href="${job.url || '#'}" target="_blank" class="apply-btn">Apply <i class="fas fa-arrow-right"></i></a>
            <div class="share-icons">
              <i class="fab fa-twitter" data-share="twitter" data-url="${job.url}" data-title="${job.title} at ${job.company}"></i>
              <i class="fab fa-linkedin-in" data-share="linkedin" data-url="${job.url}" data-title="${job.title} at ${job.company}"></i>
            </div>
          </div>
        </div>
      `).join('');

      // Attach share events
      document.querySelectorAll('[data-share]').forEach(icon => {
        icon.addEventListener('click', (e) => {
          e.stopPropagation();
          const url = icon.dataset.url || window.location.href;
          const title = icon.dataset.title || 'Amazing job opportunity';
          if (icon.dataset.share === 'twitter') {
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`, '_blank');
          } else if (icon.dataset.share === 'linkedin') {
            window.open(`https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}`, '_blank');
          }
        });
      });
    }

    // Optionally, attempt to fetch real jobs from API (if CORS allows) and merge with mock
    async function tryFetchRealJobs() {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        const response = await fetch('https://job-api-xizv.onrender.com/api/jobs', { signal: controller.signal });
        clearTimeout(timeoutId);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (Array.isArray(data) && data.length > 0) {
          // Merge with mock (avoid duplicates by company+title if desired, but we'll just replace)
          allJobs = data;
          updateLocationPills();
          displayJobs();
          console.log('✅ Real jobs loaded from API');
        } else {
          console.log('⚠️ API returned empty array, using mock data');
        }
      } catch (err) {
        console.log('⚠️ Could not fetch real jobs, using mock data:', err.message);
        // Already using mock, so nothing else to do
      }
    }

    // Theme and accent
    const themeToggle = document.getElementById('themeToggle');
    const accentPicker = document.getElementById('accentColor');
    const root = document.documentElement;

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light');
      const icon = themeToggle.querySelector('i');
      if (document.body.classList.contains('light')) {
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
      } else {
        icon.classList.remove('fa-sun');
        icon.classList.add('fa-moon');
      }
    });
    accentPicker.addEventListener('input', (e) => {
      root.style.setProperty('--accent', e.target.value);
      root.style.setProperty('--accent-glow', e.target.value + '80');
    });

    // Cursor glow
    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
      glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    });

    // Debounced search
    let debounceTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => displayJobs(), 300);
    });

    // Initialize
    updateLocationPills();
    displayJobs();
    tryFetchRealJobs(); // optional, won't break if fails
  </script>
</body>
</html>
