<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApplyMore | Next-Gen Job Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#6366f1;
  --accent2:#22d3ee;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:var(--text);
}

.container{max-width:1200px;margin:auto;padding:20px}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:40px
}
.logo{
  font-size:26px;font-weight:800;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;color:transparent
}

/* HERO */
.hero{text-align:center;margin-bottom:50px}
.hero h1{
  font-size:48px;font-weight:800;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;color:transparent;
}
.hero p{color:var(--muted);margin-top:10px}

/* SEARCH */
.search-bar{
  display:flex;gap:10px;margin:30px 0;
  background:rgba(255,255,255,0.05);
  padding:10px;border-radius:12px
}
.search-bar input{
  flex:1;padding:12px;border:none;border-radius:10px;
  background:#020617;color:white
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px
}

/* CARD */
.card{
  background:linear-gradient(145deg,#0f172a,#020617);
  padding:20px;border-radius:16px;
  border:1px solid rgba(255,255,255,0.05);
  transition:.3s;
  position:relative;
  overflow:hidden
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(99,102,241,0.2),transparent);
  opacity:0;
  transition:.3s
}

.card:hover{
  transform:translateY(-8px) scale(1.01);
  border-color:var(--accent)
}
.card:hover::after{opacity:1}

.title{font-size:18px;font-weight:600}
.company{color:var(--accent);margin:6px 0}
.location{font-size:12px;color:var(--muted)}
.tags{margin-top:8px}
.tag{
  display:inline-block;
  padding:4px 8px;
  font-size:10px;
  background:rgba(99,102,241,0.2);
  border-radius:6px;
  margin-right:5px
}

.btn{
  display:inline-block;margin-top:12px;
  padding:8px 14px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:8px;color:white;text-decoration:none;
  font-size:13px
}

/* SKELETON */
.skeleton{
  height:120px;
  border-radius:12px;
  background:linear-gradient(90deg,#0f172a,#1e293b,#0f172a);
  animation:shimmer 1.5s infinite
}

@keyframes shimmer{
  0%{background-position:-200px 0}
  100%{background-position:200px 0}
}

footer{
  text-align:center;margin-top:50px;color:var(--muted)
}

</style>
</head>
<body>

<div class="container">
<header>
<div class="logo">ApplyMore</div>
</header>

<div class="hero">
<h1>Land Your Dream Job Faster</h1>
<p>Smart job discovery for IT freshers across India</p>
</div>

<div class="search-bar">
<input id="search" placeholder="Search roles, companies, skills...">
</div>

<div id="jobs" class="grid"></div>

<footer>
<p>Built like a startup product 🚀</p>
</footer>
</div>

<script>
const API="https://job-api-xizv.onrender.com/api/jobs";
let data=[];

function showSkeleton(){
  const el=document.getElementById('jobs');
  el.innerHTML=Array(6).fill('<div class="skeleton"></div>').join('');
}

async function load(){
  showSkeleton();
  try{
    const res=await fetch(API);
    data=await res.json();
    render(data);
  }catch{
    document.getElementById('jobs').innerHTML="Failed to load jobs";
  }
}

function render(list){
  const el=document.getElementById('jobs');
  el.innerHTML=list.map(j=>`
    <div class="card">
      <div class="title">${j.title}</div>
      <div class="company">${j.company}</div>
      <div class="location">${j.location||'Remote'}</div>
      <div class="tags">
        <span class="tag">Fresher</span>
        <span class="tag">IT</span>
      </div>
      <a href="${j.url}" target="_blank" class="btn">Apply Now</a>
    </div>
  `).join('');
}

document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  render(data.filter(j=>
    j.title.toLowerCase().includes(q) ||
    j.company.toLowerCase().includes(q)
  ));
});

load();
</script>

</body>
</html>
