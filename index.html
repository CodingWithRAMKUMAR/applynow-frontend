<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApplyMore – India’s IT Fresher Job Board</title>
  <meta name="description" content="ApplyMore – free job board for IT freshers in India. Find genuine entry-level jobs in Hyderabad, Bangalore, Chennai. Updated daily. Resume builder & interview prep included.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6599003415562086" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a2a;--card-bg:rgba(20,20,50,0.65);--text:#f0f3ff;--text-muted:#9ca3cf;--border:rgba(255,255,255,0.1);--accent:#3b82f6;--purple:#8b5cf6}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .container{max-width:1400px;margin:0 auto;padding:1.5rem}
    .nav-links{display:flex;justify-content:center;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap}
    .nav-links a{color:var(--text-muted);text-decoration:none;font-size:0.9rem}
    .nav-links a:hover{color:var(--accent)}
    .hero{text-align:center;margin-bottom:2rem}
    .hero h1{font-size:2.5rem;background:linear-gradient(135deg,var(--accent),var(--purple));background-clip:text;-webkit-background-clip:text;color:transparent}
    .hero p{color:var(--text-muted);max-width:600px;margin:0.5rem auto}
    .stats{display:flex;justify-content:center;gap:2rem;margin-bottom:2rem}
    .stat-card{background:var(--card-bg);padding:1rem 2rem;border-radius:1rem;text-align:center}
    .stat-number{font-size:2rem;font-weight:700;color:var(--accent)}
    .filters{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;align-items:center;justify-content:center}
    .filter-group select,.search-box input{padding:0.5rem 1rem;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:2rem;color:var(--text)}
    .search-box{position:relative}
    .search-box i{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted)}
    .search-box input{padding-left:2rem;width:260px}
    .jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem;margin-bottom:2rem}
    .job-card{background:var(--card-bg);border-radius:1rem;padding:1.2rem;border:1px solid var(--border);transition:0.2s;cursor:pointer}
    .job-card:hover{transform:translateY(-3px);border-color:var(--accent)}
    .job-title{font-size:1.1rem;font-weight:600;margin-bottom:0.3rem;color:var(--accent)}
    .company{font-size:0.85rem;margin-bottom:0.3rem}
    .job-meta{display:flex;gap:0.8rem;font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem}
    .job-meta span{display:flex;align-items:center;gap:0.2rem}
    .experience-tag{background:rgba(59,130,246,0.2);padding:0.2rem 0.5rem;border-radius:2rem;font-size:0.7rem;width:fit-content}
    .new-badge{background:#dc2626;color:white;padding:0.2rem 0.5rem;border-radius:2rem;font-size:0.6rem;margin-left:0.5rem;display:inline-block}
    .load-more{text-align:center;margin:2rem 0}
    .load-more button{background:var(--accent);color:white;border:none;padding:0.6rem 1.5rem;border-radius:2rem;cursor:pointer;transition:0.2s}
    .load-more button:hover{background:var(--purple)}
    .skeleton{background:rgba(255,255,255,0.05);border-radius:1rem;height:200px;animation:pulse 1.5s infinite}
    @keyframes pulse{0%{opacity:0.6}50%{opacity:1}100%{opacity:0.6}}
    .resources-section{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;margin-bottom:2rem}
    .resource-card{background:var(--card-bg);border-radius:1rem;padding:1rem}
    .resource-card h3{color:var(--accent);margin-bottom:0.5rem}
    .resource-card p{font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem}
    .resource-card a{color:var(--accent);text-decoration:none}
    .section-title{margin:2rem 0 1rem;color:var(--accent);font-size:1.4rem}
    .message-box{background:var(--card-bg);border-radius:1rem;padding:1.5rem;text-align:center;color:var(--text-muted)}
    footer{text-align:center;margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);color:var(--text-muted);font-size:0.7rem}
    @media (max-width:640px){.hero h1{font-size:1.8rem}.stats{flex-direction:column;align-items:center}}
  </style>
  <link rel="icon" type="image/png" sizes="512x512" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <meta property="og:image" content="https://applymore.vercel.app/logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
<div class="container">
  <div class="nav-links">
    <a href="index.html">🏠 Home</a>
    <a href="about.html">📖 About</a>
    <a href="blog.html">✍️ Blog</a>
    <a href="contact.html">📧 Contact</a>
    <a href="privacy.html">🔒 Privacy</a>
    <a href="terms.html">⚖️ Terms</a>
  </div>
  <div class="hero">
    <h1>ApplyMore</h1>
    <p>India’s most trusted IT fresher job board – genuine jobs, updated daily.</p>
  </div>
  <div class="stats" id="stats">
    <div class="stat-card"><div class="stat-number" id="totalJobs">0</div><div>Total Jobs</div></div>
    <div class="stat-card"><div class="stat-number" id="newJobs">0</div><div>New Today</div></div>
  </div>
  <div class="filters">
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search jobs..."></div>
    <div class="filter-group"><select id="locationFilter"><option value="">All Cities</option><option value="Hyderabad">Hyderabad</option><option value="Bangalore">Bangalore</option><option value="Chennai">Chennai</option></select></div>
    <div class="filter-group"><select id="expFilter"><option value="">All Experience</option><option value="Fresher">Fresher (0-2 years)</option><option value="1-2">1-2 years</option><option value="3+">3+ years</option></select></div>
  </div>
  <div id="jobsGrid" class="jobs-grid"></div>
  <div id="loadMoreContainer" class="load-more" style="display:none"><button id="loadMoreBtn">Load More</button></div>

  <!-- PDF Section -->
  <h2 class="section-title">📘 Interview Ready PDFs</h2>
  <div id="pdfsContainer" class="resources-section"></div>

  <!-- Certifications Section -->
  <h2 class="section-title">🎓 Recommended Certifications (Free / Low Cost)</h2>
  <div id="certsContainer" class="resources-section"></div>

  <footer>© 2026 ApplyMore – Helping IT freshers land their dream job</footer>
</div>

<script>
  (function() {
    const SUPABASE_URL = 'https://qmljqckhhdmvcbomydhf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_rmCQIW6Lw90zleW-lYZcFw_WZrcHw4h';
    let allJobs = [];
    let filteredJobs = [];
    let currentPage = 1;
    const jobsPerPage = 20;

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function formatDate(d) {
      if (!d) return '';
      const diff = Math.ceil((new Date() - new Date(d)) / (1000 * 60 * 60 * 24));
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      if (diff < 7) return `${diff} days ago`;
      return new Date(d).toLocaleDateString('en-IN');
    }

    function getExperienceLevel(job) {
      const text = (job.title + ' ' + (job.description || '')).toLowerCase();
      if (/(senior|lead|principal|architect|manager|director|head)/i.test(text)) return '3+';
      if (/(fresher|entry level|graduate|trainee|junior)/i.test(text)) return 'Fresher';
      const match = text.match(/(\d+)\s*years?/i);
      if (match) {
        const y = parseInt(match[1]);
        if (y >= 3) return '3+';
        if (y >= 1) return '1-2';
      }
      return 'Fresher';
    }

    function isNewJob(postedDate) {
      if (!postedDate) return false;
      return (new Date() - new Date(postedDate)) / (1000 * 60 * 60 * 24) <= 1;
    }

    function showSkeletons(show) {
      const grid = document.getElementById('jobsGrid');
      if (show) {
        grid.innerHTML = Array(6).fill().map(() => '<div class="skeleton" style="height:180px"></div>').join('');
      }
    }

    async function fetchJobs() {
      showSkeletons(true);
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ApplyMore?select=*&order=created_at.desc`, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const jobs = await res.json();
        allJobs = jobs;
        document.getElementById('totalJobs').innerText = allJobs.length;
        const todayStr = new Date().toDateString();
        const newToday = allJobs.filter(j => j.created_at && new Date(j.created_at).toDateString() === todayStr).length;
        document.getElementById('newJobs').innerText = newToday;
        applyFilters();
      } catch (err) {
        console.error('Job fetch error:', err);
        showSkeletons(false);
        document.getElementById('jobsGrid').innerHTML = '<div class="message-box">⚠️ Unable to load jobs. Please refresh.</div>';
      }
    }

    function applyFilters() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const location = document.getElementById('locationFilter').value;
      const exp = document.getElementById('expFilter').value;
      filteredJobs = allJobs.filter(job => {
        if (searchTerm && !(job.title.toLowerCase().includes(searchTerm) || job.company.toLowerCase().includes(searchTerm))) return false;
        if (location && job.location !== location) return false;
        if (exp) {
          const jobExp = getExperienceLevel(job);
          if (exp === 'Fresher' && jobExp !== 'Fresher') return false;
          if (exp === '1-2' && jobExp !== '1-2') return false;
          if (exp === '3+' && jobExp !== '3+') return false;
        }
        return true;
      });
      currentPage = 1;
      renderJobs();
    }

    function renderJobs() {
      const start = (currentPage - 1) * jobsPerPage;
      const paginated = filteredJobs.slice(start, start + jobsPerPage);
      const grid = document.getElementById('jobsGrid');
      if (paginated.length === 0) {
        grid.innerHTML = '<div class="message-box">📭 No jobs found. Try different filters.</div>';
        document.getElementById('loadMoreContainer').style.display = 'none';
        return;
      }
      grid.innerHTML = paginated.map(job => `
        <div class="job-card" onclick="window.location.href='job.html?id=${job.id}'">
          <div class="job-title">${escapeHtml(job.title)}</div>
          <div class="company">🏢 ${escapeHtml(job.company)}</div>
          <div class="job-meta">
            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'India')}</span>
            <span><i class="fas fa-calendar-alt"></i> ${formatDate(job.created_at)}</span>
          </div>
          <div class="experience-tag">📅 ${getExperienceLevel(job)} years</div>
          ${isNewJob(job.created_at) ? '<div class="new-badge">✨ New</div>' : ''}
        </div>
      `).join('');
      const hasMore = start + jobsPerPage < filteredJobs.length;
      document.getElementById('loadMoreContainer').style.display = hasMore ? 'block' : 'none';
    }

    async function loadResources() {
      try {
        const res = await fetch('/data/resources.json');
        if (!res.ok) throw new Error('Resources not found');
        const data = await res.json();
        
        // PDFs section
        const pdfsContainer = document.getElementById('pdfsContainer');
        if (data.pdfs && data.pdfs.length > 0) {
          pdfsContainer.innerHTML = data.pdfs.map(pdf => `
            <div class="resource-card">
              <h3>📄 ${escapeHtml(pdf.title)}</h3>
              <p>${escapeHtml(pdf.description)}</p>
              <a href="${pdf.url}" target="_blank">📥 Download PDF →</a>
            </div>
          `).join('');
        } else {
          pdfsContainer.innerHTML = '<div class="message-box">📚 No PDF resources available yet – check back soon.</div>';
        }
        
        // Certifications section
        const certsContainer = document.getElementById('certsContainer');
        if (data.certifications && data.certifications.length > 0) {
          certsContainer.innerHTML = data.certifications.map(cert => `
            <div class="resource-card">
              <h3>🎓 ${escapeHtml(cert.title)}</h3>
              <p>${escapeHtml(cert.description)}</p>
              <a href="${cert.url}" target="_blank">🔗 View Course →</a>
            </div>
          `).join('');
        } else {
          certsContainer.innerHTML = '<div class="message-box">🎓 No certifications added yet – check back soon.</div>';
        }
      } catch (e) {
        console.error('Resources error:', e);
        document.getElementById('pdfsContainer').innerHTML = '<div class="message-box">📚 PDF resources will appear soon.</div>';
        document.getElementById('certsContainer').innerHTML = '<div class="message-box">🎓 Certification links will appear soon.</div>';
      }
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('locationFilter').addEventListener('change', applyFilters);
    document.getElementById('expFilter').addEventListener('change', applyFilters);
    document.getElementById('loadMoreBtn').addEventListener('click', () => { currentPage++; renderJobs(); });

    fetchJobs();
    loadResources();
  })();
</script>
</body>
</html>
